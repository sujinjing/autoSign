name: auto_helper

on:
  schedule:
    - cron: "25 6 * * *" # UTC时间6:25，即北京时间14:25执行，避开GitHub Actions整点高峰
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 14
          registry-url: https://npm.pkg.github.com/
      - name: Run Project with Random Delay
        env:
          COOKIE: ${{ secrets.COOKIE }}
          USER: ${{ secrets.USER }}
          PASS: ${{ secrets.PASS }}
          TO: ${{ secrets.TO }}
        run: |
          npm i
          # 生成0~30秒之间的随机延迟
          DELAY=$((RANDOM % 31))
          echo "⏳ 延迟 $DELAY 秒后执行"
          sleep $DELAY
          node src/juejin.js "${COOKIE}" "${USER}" "${PASS}" "${TO}"
